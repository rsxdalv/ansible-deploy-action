# Composite action — deploy a service via OIDC-authenticated webhook.
#
# Usage:
#
#   permissions:
#     id-token: write       # required to mint the OIDC JWT
#     contents: read
#     deployments: write    # required only when create-deployment: 'true'
#
#   steps:
#     - uses: rsxdalv/ansible-deploy-action@v1
#       with:
#         webhook-url: ${{ secrets.DEPLOY_WEBHOOK_URL }}
#         service: my-service-name       # optional — defaults to repo name
#         version: ${{ steps.build.outputs.version }}   # optional — defaults to 'latest'
#         package: my-apt-package        # optional — override apt package name
#                                        #   use with service: apt-install for repos
#                                        #   not registered in services.js
#         # Optional GitHub Deployment tracking:
#         create-deployment: 'true'
#         token: ${{ secrets.GITHUB_TOKEN }}
#         env: production
#         env-url: https://my-service.example.com/

name: 'Ansible Deploy'
description: 'Deploy a service via GitHub OIDC-authenticated webhook'

inputs:
  webhook-url:
    description: 'Base URL of the deployment webhook (e.g. https://ansible.ttswebui.com)'
    required: true
  service:
    description: |
      Name of the service to deploy, as registered in services.js on the server.
      Defaults to the calling repository name (without the org prefix).
      Use 'apt-install' to install any apt package without a dedicated services.js entry.
    required: false
    default: ''
  version:
    description: 'Version string to deploy (e.g. 1.2.3 or a package version from a build step)'
    required: false
    default: 'latest'
  package:
    description: |
      Override the apt package name passed to Ansible.
      When omitted the package defaults to the service name.
      Required when service is 'apt-install' and the package name differs from the repo name.
    required: false
    default: ''

  # ── Optional GitHub Deployment tracking ────────────────────────────────────
  create-deployment:
    description: |
      When 'true', creates a GitHub Deployment record before deploying and
      updates it (success/failure) after. Requires deployments: write permission
      on the calling job and a token input.
    required: false
    default: 'false'
  token:
    description: 'GITHUB_TOKEN for creating/updating GitHub Deployment records (required when create-deployment is true)'
    required: false
    default: ''
  env:
    description: 'GitHub Deployment environment name (used when create-deployment is true)'
    required: false
    default: 'production'
  env-url:
    description: 'URL shown on the GitHub Deployments tab (optional, used when create-deployment is true)'
    required: false
    default: ''

outputs:
  response:
    description: 'JSON response body from the webhook'
    value: ${{ steps.deploy.outputs.response }}
  deployment-id:
    description: 'GitHub Deployment ID (only set when create-deployment is true)'
    value: ${{ steps.deployment-start.outputs.deployment_id }}

runs:
  using: 'composite'
  steps:
    # ── 0. Create GitHub Deployment record (opt-in) ──────────────────────────
    - name: Create GitHub Deployment
      if: inputs.create-deployment == 'true'
      uses: bobheadxi/deployments@v1
      id: deployment-start
      with:
        step: start
        token: ${{ inputs.token }}
        env: ${{ inputs.env }}

    # ── 1. Obtain GitHub OIDC token ─────────────────────────────────────────
    # Requires the calling workflow job to have: permissions: id-token: write
    - name: Fetch OIDC token
      id: oidc
      shell: bash
      run: |
        TOKEN=$(curl -sf \
          -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=oidc-deploy-webhook" \
          | jq -r '.value')

        if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
          echo "::error::Failed to obtain OIDC token — ensure permissions: id-token: write is set"
          exit 1
        fi

        echo "::add-mask::${TOKEN}"
        echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

    # ── 2. POST to webhook ──────────────────────────────────────────────────
    - name: Deploy via webhook
      id: deploy
      shell: bash
      env:
        TOKEN: ${{ steps.oidc.outputs.token }}
        WEBHOOK_URL: ${{ inputs.webhook-url }}
        SERVICE: ${{ inputs.service }}
        VERSION: ${{ inputs.version }}
        PACKAGE: ${{ inputs.package }}
      run: |
        # Default service name = repo name (strip org/ prefix)
        [ -z "$SERVICE" ] && SERVICE="${GITHUB_REPOSITORY##*/}"

        echo "→ service=${SERVICE}  version=${VERSION}  package=${PACKAGE:-<same as service>}"

        # Build JSON body — include 'package' only when explicitly set
        BODY="{\"version\":\"${VERSION}\""
        [ -n "$PACKAGE" ] && BODY="${BODY},\"package\":\"${PACKAGE}\""
        BODY="${BODY}}"

        RESP=$(curl -s -w "\n%{http_code}" \
          -X POST "${WEBHOOK_URL}/deploy/${SERVICE}" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "Content-Type: application/json" \
          -d "${BODY}")

        BODY_OUT=$(echo "$RESP" | head -n -1)
        CODE=$(echo "$RESP" | tail -n1)

        echo "HTTP ${CODE}"
        echo "$BODY_OUT" | jq . 2>/dev/null || echo "$BODY_OUT"
        echo "response=${BODY_OUT}" >> "$GITHUB_OUTPUT"

        if [ "$CODE" != "200" ]; then
          echo "::error::Deploy webhook returned HTTP ${CODE}: $(echo $BODY_OUT | jq -r '.detail // .error // .' 2>/dev/null)"
          exit 1
        fi

    # ── 3. Update GitHub Deployment record (opt-in) ─────────────────────────
    - name: Update GitHub Deployment status
      if: always() && inputs.create-deployment == 'true'
      uses: bobheadxi/deployments@v1
      with:
        step: finish
        token: ${{ inputs.token }}
        status: ${{ job.status }}
        deployment_id: ${{ steps.deployment-start.outputs.deployment_id }}
        env: ${{ inputs.env }}
        env_url: ${{ inputs.env-url }}
